{% extends 'base.html' %}
{% block title %}{{ 'Editar' if editar else 'Registrar' }} Paciente – EPS Citas{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-person-{{ 'pencil-fill' if editar else 'plus-fill' }}"></i>
        {{ 'Editar Paciente' if editar else 'Registrar Nuevo Paciente' }}
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Número de Documento *</label>
            <input type="text" name="documento" class="form-control"
                   value="{{ paciente.documento if paciente else '' }}"
                   {{ 'readonly' if editar else '' }} required
                   placeholder="Ej: 1023456789">
            {% if editar %}<small class="text-muted">El documento no se puede modificar.</small>{% endif %}
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nombre *</label>
              <input type="text" name="nombre" class="form-control" required
                     value="{{ paciente.nombre if paciente else '' }}" placeholder="Nombre">
            </div>
            <div class="col-md-6">
              <label class="form-label">Apellido *</label>
              <input type="text" name="apellido" class="form-control" required
                     value="{{ paciente.apellido if paciente else '' }}" placeholder="Apellido">
            </div>
          </div>
          <div class="row g-3 mt-1">
            <div class="col-md-6">
              <label class="form-label">Teléfono</label>
              <input type="tel" name="telefono" class="form-control"
                     value="{{ paciente.telefono if paciente else '' }}" placeholder="Ej: 3001234567">
            </div>
            <div class="col-md-6">
              <label class="form-label">Correo Electrónico</label>
              <input type="email" name="correo" class="form-control"
                     value="{{ paciente.correo if paciente else '' }}" placeholder="correo@ejemplo.com">
            </div>
          </div>
          <div class="mt-3">
            <label class="form-label">EPS Asignada</label>
            <select name="eps" class="form-select">
              <option value="">-- Selecciona una EPS --</option>
              {% set eps_list = ['Sura', 'Nueva EPS', 'Compensar', 'Famisanar', 'Coomeva', 'Salud Total', 'Colsanitas', 'Sanitas', 'Otra'] %}
              {% for e in eps_list %}
                <option value="{{ e }}" {{ 'selected' if paciente and paciente.eps == e else '' }}>{{ e }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-teal flex-fill">
              <i class="bi bi-check-circle-fill me-1"></i>
              {{ 'Guardar Cambios' if editar else 'Registrar Paciente' }}
            </button>
            <a href="{{ url_for('pacientes') }}" class="btn btn-outline-secondary flex-fill">
              <i class="bi bi-arrow-left me-1"></i>Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
